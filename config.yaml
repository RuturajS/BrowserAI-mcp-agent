# -------------------------------------------------------------
# USE CASE 1: Default/Single Browser (Visible Mode)
# "browsers": ["chrome"], "headless": false, "parallel": false
#
# USE CASE 2: Cross-Browser Comparison (Parallel/Visible)
# "browsers": ["chrome", "firefox", "edge"], "parallel": true
#
# USE CASE 3: Fast Background Testing
# "browsers": ["all"], "headless": true, "parallel": true
# -------------------------------------------------------------

browserSettings:
  browsers: ["chrome"] # Options: "chrome", "firefox", "edge", "webkit", "all"
  headless: false       # RECOMMENDED: Set to true for Docker execution
  parallel: false
  viewport:
    width: 1380
    height: 820
  recordVideo: true
  slowMo: 0
  screenshotInterval: 5 # Automatically take a screenshot every X seconds (0 to disable)

directories:
  logs: "logs"
  screenshots: "screenshots"
  videos: "videos"
  exports: "exports"

automationOptions:
  cleanAtStartup: false  # Set to true to automatically empty logs, screenshots and videos folders each time the server starts
