# -------------------------------------------------------------
# USE CASE 1: Default/Single Browser (Visible Mode)
# "browsers": ["chrome"], "headless": false, "parallel": false
#
# USE CASE 2: Cross-Browser Comparison (Parallel/Visible)
# "browsers": ["chrome", "firefox", "edge"], "parallel": true
#
# USE CASE 3: Fast Background Testing
# "browsers": ["all"], "headless": true, "parallel": true
# -------------------------------------------------------------

browserSettings:
  browsers: ["chrome"] # Options: "chrome", "firefox", "edge", "webkit", "all"
  headless: false       # RECOMMENDED: Set to true for Docker execution
  parallel: false
  viewport:
    width: 1380
    height: 820
  recordVideo: true
  slowMo: 0
  screenshotInterval: 5 # Automatically take a screenshot every X seconds (0 to disable)

# -------------------------------------------------------------
# Efficiency & Cost Management
# -------------------------------------------------------------
efficiency:
  minimizeDom: true         # Only return minimal DOM/structured data (buttons, inputs, links)
  useElementMap: true       # Cache and reuse selectors for previously identified elements
  targetedScreenshots: true # Take screenshots of specific elements or regions instead of full page
  reductionTarget: 0.9      # Aim for 90% reduction in token consumption

tokenUsage:
  enabled: true
  limit: 100000             # Maximum tokens allowed per session/day (example)
  stopOnLimit: true        # Stop execution if token limit is reached
  logLevel: "detailed"      # Options: "summary", "detailed"
  directories:
    tokenLogs: "logs/token_usage"

directories:
  logs: "logs"
  screenshots: "screenshots"
  videos: "videos"
  exports: "exports"

automationOptions:
  cleanAtStartup: false  # Set to true to automatically empty logs, screenshots and videos folders each time the server starts
